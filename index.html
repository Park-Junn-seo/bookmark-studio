<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookmark Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="sidebar" aria-label="북마크 필터">
          <div class="brand">
            <div class="brand-mark">B</div>
            <div>
              <h1>Bookmark Studio</h1>
              <p>좋았던 링크와 영감을 한곳에</p>
            </div>
          </div>

          <label class="search-box">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="제목, 메모, 태그" autocomplete="off" />
          </label>

          <nav class="filter-group" aria-label="보기 방식">
            <button class="filter-button active" data-filter="all" type="button">
              <span>전체</span>
              <strong id="allCount">0</strong>
            </button>
            <button class="filter-button" data-filter="favorite" type="button">
              <span>즐겨찾기</span>
              <strong id="favoriteCount">0</strong>
            </button>
            <button class="filter-button" data-filter="recent" type="button">
              <span>최근 추가</span>
              <strong id="recentCount">0</strong>
            </button>
          </nav>

          <div class="tag-panel">
            <div class="panel-title">태그</div>
            <div id="tagList" class="tag-list"></div>
          </div>
        </aside>

        <section class="content" aria-label="북마크 목록">
          <header class="topbar">
            <div>
              <p class="eyebrow">내 링크 보관함</p>
              <h2>오늘의 영감을 잃어버리지 않게</h2>
            </div>
            <div class="topbar-actions">
              <button id="exportButton" class="ghost-button" type="button">내보내기</button>
              <button id="importButton" class="ghost-button" type="button">불러오기</button>
              <button id="openFormButton" class="primary-button" type="button">+ 링크 추가</button>
            </div>
            <input id="importInput" class="visually-hidden" type="file" accept="application/json,.json" />
          </header>

          <form id="bookmarkForm" class="bookmark-form hidden" autocomplete="off">
            <div class="form-heading">
              <h3 id="formTitle">새 링크 추가</h3>
              <p id="formHint">URL과 태그를 넣어두면 나중에 훨씬 찾기 쉬워요.</p>
            </div>
            <div class="form-grid">
              <label>
                <span>제목</span>
                <input id="titleInput" type="text" placeholder="예: 좋은 포트폴리오 레퍼런스" required />
              </label>
              <label>
                <span>URL</span>
                <input id="urlInput" type="text" inputmode="url" placeholder="example.com 또는 https://example.com" required />
              </label>
              <label>
                <span>태그</span>
                <input id="tagsInput" type="text" placeholder="디자인, 글쓰기, 개발" />
              </label>
              <label>
                <span>메모</span>
                <input id="noteInput" type="text" placeholder="왜 저장했는지 짧게 남기기" />
              </label>
            </div>
            <div class="form-actions">
              <button id="cancelFormButton" class="ghost-button" type="button">취소</button>
              <button id="submitFormButton" class="primary-button" type="submit">저장</button>
            </div>
          </form>

          <div id="activeContext" class="active-context"></div>
          <section id="bookmarkGrid" class="bookmark-grid" aria-live="polite"></section>
          <section id="emptyState" class="empty-state hidden">
            <h3>아직 보이는 북마크가 없어요</h3>
            <p>새 링크를 추가하거나 검색어와 필터를 바꿔보세요.</p>
          </section>
        </section>
      </section>
    </main>

    <template id="bookmarkCardTemplate">
      <article class="bookmark-card">
        <div class="card-header">
          <div class="favicon" aria-hidden="true"></div>
          <button class="favorite-button" type="button" aria-label="즐겨찾기 전환">☆</button>
        </div>
        <a class="bookmark-title" target="_blank" rel="noopener noreferrer"></a>
        <p class="bookmark-note"></p>
        <div class="card-tags"></div>
        <div class="card-footer">
          <span class="bookmark-domain"></span>
          <div class="card-actions">
            <button class="edit-button" type="button">수정</button>
            <button class="delete-button" type="button">삭제</button>
          </div>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
